<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>先行一步 - AI 行人監控中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00f2ff;
            --danger: #ff4b5c;
            --success: #00e676;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background-color: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem;
            background: radial-gradient(circle at top right, #1a2a3a, var(--bg));
        }

        header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.8rem; color: var(--accent); text-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .settings-btn {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.9rem;
            transition: 0.3s;
        }
        .settings-btn:hover { background: var(--accent); color: #000; }

        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;
        }

        .camera-card {
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; overflow: hidden; transition: 0.3s; position: relative;
        }
        .camera-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .video-container { aspect-ratio: 4/3; background: #000; position: relative; }
        .video-container img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 1.2rem; }
        .info-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .cam-name { font-weight: 600; font-size: 1.1rem; }

        /* Data Grid */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; font-size: 0.85rem; }
        .data-item { display: flex; align-items: center; gap: 8px; opacity: 0.8; }
        .data-label { color: var(--accent); font-weight: 600; min-width: 45px; }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .online { background: rgba(0, 230, 118, 0.15); color: var(--success); }
        .offline { background: rgba(255, 75, 92, 0.15); color: var(--danger); }

        .rssi-bar { width: 40px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .rssi-fill { height: 100%; background: var(--success); transition: 1s; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>先行一步 AI 監控中心</h1>
        </div>
        <a href="/settings" class="settings-btn">系統設定 (Settings)</a>
    </header>

    <main class="dashboard-grid">
        {% for cam in cameras %}
        <div class="camera-card" id="cam-{{ cam.id }}">
            <div class="video-container">
                <img src="/video_feed/{{ cam.id }}" id="img-{{ cam.id }}">
            </div>
            <div class="card-info">
                <div class="info-top">
                    <span class="cam-name">{{ cam.name }}</span>
                    <span class="status-badge offline" id="badge-{{ cam.id }}">OFFLINE</span>
                </div>
                <div class="data-grid">
                    <div class="data-item">
                        <span class="data-label">訊號</span>
                        <div class="rssi-bar"><div id="rssi-{{ cam.id }}" class="rssi-fill" style="width: 0%"></div></div>
                        <span id="rssi-val-{{ cam.id }}">-- dBm</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">更新</span>
                        <span id="uptime-{{ cam.id }}">--s</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">感測</span>
                        <span id="sensor-{{ cam.id }}">-- V</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">IP</span>
                        <span>{{ cam.ip }}</span>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </main>

    <script>
        async function updateStatus() {
            try {
                const resp = await fetch('/status');
                const data = await resp.json();
                data.forEach(cam => {
                    const badge = document.getElementById('badge-' + cam.id);
                    const rssiFill = document.getElementById('rssi-' + cam.id);
                    const rssiVal = document.getElementById('rssi-val-' + cam.id);
                    const uptime = document.getElementById('uptime-' + cam.id);
                    const sensor = document.getElementById('sensor-' + cam.id);
                    
                    if (cam.online) {
                        badge.className = 'status-badge online';
                        badge.innerText = 'ONLINE';
                        
                        // RSSI logic: -30 (best) to -100 (worst)
                        let pct = Math.max(0, Math.min(100, 2 * (cam.rssi + 100)));
                        rssiFill.style.width = pct + '%';
                        rssiFill.style.background = pct > 50 ? '#00e676' : (pct > 20 ? '#ffb300' : '#ff4b5c');
                        rssiVal.innerText = cam.rssi + ' dBm';
                        
                        uptime.innerText = cam.uptime + 's';
                        sensor.innerText = cam.sensor.toFixed(2) + ' V';
                    } else {
                        badge.className = 'status-badge offline';
                        badge.innerText = 'OFFLINE';
                        rssiFill.style.width = '0%';
                        rssiVal.innerText = '-- dBm';
                    }
                });
            } catch (e) {}
        }
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
